# AEGIS Runtime — OpenClaw agent + AEGIS security infrastructure
services:
  # OpenClaw agent gateway (the brain)
  agent-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-agent
    restart: unless-stopped
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${GATEWAY_TOKEN}
    volumes:
      - agent-config:/home/node/.openclaw
      - workspace:/home/node/.openclaw/workspace
    ports:
      - "127.0.0.1:18789:18789"
    init: true
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  # AEGIS secure sandbox (the execution environment)
  sandbox:
    build:
      context: ../swarm_agency/aegis/services/sandbox
    container_name: aegis-sandbox
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=2G
    mem_limit: 6g
    cpus: 2.0
    networks:
      - default
      - sandbox-net
    volumes:
      - workspace:/workspace:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  # AEGIS API (the platform layer)
  api:
    build:
      context: ../swarm_agency/aegis/services/orchestrator
    container_name: aegis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agent-gateway:
        condition: service_healthy
    volumes:
      - workspace:/app/workspace
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GATEWAY_URL: ws://agent-gateway:18789
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Database (audit trail, multi-tenant data)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (task queue, pub/sub, rate limiting)
  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agent-config:
  workspace:
  pgdata:
  redisdata:

networks:
  default:
  sandbox-net:
    internal: true  # No internet access for sandbox
